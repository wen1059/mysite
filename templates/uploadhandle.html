{% extends 'base.html' %}

{% block other_base %}
    <div class="container mt-2">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <select name="mode" class="form-select mb-3">
                <option value="ptc">PDF 转 CSV</option>
                <option value="ptw">PDF 转 Word</option>
                <option value="ppr">PDF 去除加密</option>
                <option value="epr">Excel 去除加密</option>
                <option value="wpr">Word 去除加密</option>
            </select>
            <input type="file" name="uploadfiles" class="form-control" multiple
                   onchange="this.form.submit()">
        </form>


        <table class="table table-hover">
            <thead class="table-success">
            <tr>
                <th>upload</th>
                <th>download</th>
                <th>time</th>
            </tr>
            </thead>
            <tbody>
            {% for data in datas %}
                <tr>
                    <td>{{ data.filein }}</td>
                    <td><a href='/media/{{ data.fileout }}'>{{ data.fileout }}</a></td>
                    <td>{{ data.timestamp }}</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock other_base %}
